<!doctype html>

<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meme Deposu</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0d;
      --card: #1a1a1a;
      --accent: #e8ff47;
      --text: #f0f0f0;
      --muted: #888;
      --border: #2a2a2a;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 20% 0%, #171717, #0d0d0d 45%);
      color: var(--text);
      font-family: "DM Sans", sans-serif;
      min-height: 100vh;
    }
    .container { width: min(1180px, 100% - 24px); margin: 24px auto 80px; }
    .topbar { display: flex; gap: 12px; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; }
    h1 { margin: 0; font-family: "DM Mono", monospace; letter-spacing: 0.04em; font-size: clamp(22px, 3vw, 32px); }
    .search {
      width: 100%; border: 0; border-bottom: 2px solid var(--accent);
      background: #0a0a0a; color: var(--text); padding: 12px 14px;
      font-size: 15px; outline: none; transition: all 0.15s ease;
      border-radius: 8px 8px 0 0;
    }
    .search::placeholder { color: var(--muted); }
    .search:focus { background: #131313; border-bottom-color: #f3ff9c; }
    .uploader {
      margin-top: 16px; background: #101010; border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px;
    }
    .dropzone {
      border: 2px dashed var(--border); border-radius: 12px; min-height: 110px;
      display: grid; place-items: center; text-align: center; color: var(--muted);
      padding: 12px; cursor: pointer; transition: all 0.15s ease;
      font-family: "DM Mono", monospace; background: #121212; user-select: none;
    }
    .dropzone:hover { border-color: #555; }
    .dropzone.dragover { border-color: var(--accent); color: var(--accent); background: #161616; box-shadow: 0 0 0 1px var(--accent) inset; }
    .preview-wrap { display: none; align-items: center; gap: 12px; margin-top: 10px; }
    .preview-wrap.show { display: flex; }
    #previewImg { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }
    .preview-name { font-size: 12px; color: var(--muted); word-break: break-all; }
    .upload-grid { margin-top: 12px; display: grid; gap: 10px; grid-template-columns: 1fr; }
    @media (min-width: 880px) { .upload-grid { grid-template-columns: 1fr 1fr auto; } }
    .input {
      width: 100%; border-radius: 10px; border: 1px solid var(--border);
      background: #131313; color: var(--text); padding: 10px 12px;
      transition: all 0.15s ease; font-size: 14px; font-family: "DM Sans", sans-serif;
    }
    .input::placeholder { color: var(--muted); }
    .input:focus { outline: none; border-color: var(--accent); }
    .button {
      width: 100%; border-radius: 10px; border: 1px solid var(--border);
      background: var(--accent); color: #151515; padding: 10px 12px;
      transition: all 0.15s ease; font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: "DM Sans", sans-serif;
    }
    .button:hover:not(:disabled) { filter: brightness(1.08); }
    .button:disabled { opacity: 0.6; cursor: not-allowed; }
    .ghost-btn {
      cursor: pointer; border: 1px solid var(--border); background: #171717;
      color: var(--text); border-radius: 10px; padding: 10px 12px;
      font-size: 13px; transition: all 0.15s ease; font-family: "DM Sans", sans-serif;
      white-space: nowrap;
    }
    .ghost-btn:hover { border-color: var(--accent); color: var(--accent); }
    .progress-wrap { height: 3px; background: var(--border); border-radius: 999px; margin-top: 10px; display: none; overflow: hidden; }
    .progress-wrap.show { display: block; }
    .progress-bar { height: 100%; width: 0%; background: var(--accent); border-radius: 999px; transition: width 0.2s; }
    .gallery {
      margin-top: 18px; display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px;
    }
    @media (min-width: 640px) { .gallery { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
    @media (min-width: 880px) { .gallery { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
    @media (min-width: 1200px) { .gallery { grid-template-columns: repeat(5, minmax(0, 1fr)); } }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; transition: all 0.15s ease; position: relative; cursor: pointer;
      animation: fadeUp 0.2s ease both;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .thumb { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; display: block; background: #0b0b0b; }
    .card-body { padding: 10px; }
    .card-title { margin: 0 0 8px; font-size: 13px; font-weight: 500; word-break: break-word; }
    .tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag {
      border: 1px solid #323232; background: #2a2a2a; color: #d7d7d7;
      border-radius: 999px; padding: 3px 8px; font-size: 11px;
      font-family: "DM Mono", monospace; cursor: pointer; transition: all 0.15s ease;
    }
    .tag.active, .tag:hover { background: var(--accent); border-color: var(--accent); color: #151515; }
    .card-actions {
      position: absolute; top: 8px; right: 8px; display: flex; gap: 6px;
      opacity: 0; transition: all 0.15s ease;
    }
    .card:hover .card-actions, .card:focus-within .card-actions { opacity: 1; }
    .icon-btn {
      border: 1px solid #2f2f2f; background: rgba(20,20,20,0.92); color: #ececec;
      width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center;
      cursor: pointer; transition: all 0.15s ease; font-size: 14px;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
    .empty { margin-top: 12px; color: var(--muted); font-size: 14px; }
    .gallery-meta { margin-top: 12px; font-size: 12px; color: var(--muted); font-family: "DM Mono", monospace; }
    .toast {
      position: fixed; right: 14px; bottom: 14px; background: #161616;
      border: 1px solid var(--accent); color: var(--text); padding: 10px 14px;
      border-radius: 10px; font-size: 13px; opacity: 0; transform: translateY(8px);
      pointer-events: none; transition: all 0.15s ease; z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .viewer {
      position: fixed; inset: 0; background: rgba(6,6,6,0.93);
      display: none; align-items: center; justify-content: center;
      padding: 18px; z-index: 60;
    }
    .viewer.open { display: flex; }
    .viewer-panel {
      width: min(980px, 100%); background: #121212; border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden; display: flex; flex-direction: column;
      max-height: 92vh;
    }
    .viewer-top {
      display: flex; justify-content: space-between; align-items: center;
      gap: 10px; padding: 10px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .viewer-title {
      margin: 0; font-family: "DM Mono", monospace; font-size: 13px;
      color: #d6d6d6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .viewer-controls { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .viewer-stage {
      flex: 1; min-height: 0; background: #0f0f0f;
      display: grid; place-items: center; overflow: hidden;
    }
    .viewer-image { max-width: 100%; max-height: 70vh; object-fit: contain; display: block; }
    .viewer-bottom {
      padding: 10px 12px; border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      gap: 10px; flex-wrap: wrap; flex-shrink: 0;
    }
    .viewer-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .viewer-btn {
      border: 1px solid var(--border); border-radius: 10px; background: #171717;
      color: var(--text); padding: 7px 12px; cursor: pointer; text-decoration: none;
      transition: all 0.15s ease; font-size: 13px; line-height: 1;
      font-family: "DM Sans", sans-serif;
    }
    .viewer-btn:hover { border-color: var(--accent); color: var(--accent); }
    #initOverlay {
      position: fixed; inset: 0; background: #0d0d0d;
      display: flex; align-items: center; justify-content: center;
      z-index: 999; transition: opacity 0.3s;
    }
    #initOverlay.hidden { opacity: 0; pointer-events: none; }
    #initMsg { font-family: "DM Mono", monospace; font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>

<!-- Loading overlay — hides once Supabase config is ready -->

<div id="initOverlay"><span id="initMsg">Yükleniyor...</span></div>

<main class="container">
  <div class="topbar">
    <h1>MEME DEPOT</h1>
  </div>

  <input id="searchInput" class="search" type="text" placeholder="Başlık veya etiket ara..." autocomplete="off" />

  <section class="uploader">
    <div id="dropzone" class="dropzone" role="button" tabindex="0">
      <div><strong>Dosyayı buraya bırak</strong><br />veya aşağıdan seç</div>
    </div>
    <div id="previewWrap" class="preview-wrap">
      <img id="previewImg" src="" alt="önizleme" />
      <span id="previewName" class="preview-name"></span>
    </div>
    <div class="upload-grid">
      <button id="pickFileBtn" class="ghost-btn" type="button">📁 Dosya Seç</button>
      <input id="titleInput" class="input" type="text" placeholder="Başlık (opsiyonel)" maxlength="140" />
      <input id="tagsInput" class="input" type="text" placeholder="Etiketler: kedi, komik, günlük" />
    </div>
    <div id="progressWrap" class="progress-wrap"><div id="progressBar" class="progress-bar"></div></div>
    <button id="uploadBtn" class="button" type="button" style="margin-top:10px">Yükle</button>
    <input id="fileInput" type="file" accept="image/jpeg,image/png,image/gif,image/webp" hidden />
  </section>

  <p id="galleryMeta" class="gallery-meta"></p>
  <section id="gallery" class="gallery"></section>
  <p id="emptyState" class="empty" hidden>Henüz meme yok. İlkini yükle!</p>
</main>

<div id="toastEl" class="toast"></div>

<div id="viewer" class="viewer" aria-hidden="true">
  <div class="viewer-panel" role="dialog" aria-modal="true" aria-label="Meme önizleme">
    <div class="viewer-top">
      <p id="viewerTitle" class="viewer-title">Önizleme</p>
      <div class="viewer-controls">
        <button id="viewerPrevBtn" type="button" class="viewer-btn">← Önceki</button>
        <button id="viewerNextBtn" type="button" class="viewer-btn">Sonraki →</button>
        <button id="viewerCopyBtn" type="button" class="viewer-btn">⎘ Link</button>
        <a id="viewerDownloadBtn" class="viewer-btn" href="#" download>⬇ İndir</a>
        <button id="viewerCloseBtn" type="button" class="viewer-btn">✕ Kapat</button>
      </div>
    </div>
    <div class="viewer-stage">
      <img id="viewerImage" class="viewer-image" src="" alt="" />
    </div>
    <div class="viewer-bottom">
      <div id="viewerTags" class="viewer-tags"></div>
    </div>
  </div>
</div>

<!-- Load Supabase THEN init app via /api/config -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
(async () => {
  // ── 1. FETCH CONFIG FROM VERCEL SERVERLESS FUNCTION ──────────────────────
  const overlay = document.getElementById("initOverlay");
  const initMsg = document.getElementById("initMsg");

  let SUPABASE_URL = "";
  let SUPABASE_KEY = "";

  try {
    const res = await fetch("/api/config.js");
    if (!res.ok) throw new Error("config endpoint returned " + res.status);
    const js = await res.text();
    // Execute the returned JS which sets window.__MEME_DEPOT_CONFIG__
    // eslint-disable-next-line no-new-func
    new Function(js)();
    const cfg = window.__MEME_DEPOT_CONFIG__ || {};
    SUPABASE_URL = String(cfg.SUPABASE_URL || "").trim();
    SUPABASE_KEY = String(cfg.SUPABASE_KEY || "").trim();
  } catch (err) {
    console.error("Config fetch failed:", err);
  }

  const configOk = SUPABASE_URL && SUPABASE_KEY &&
    !SUPABASE_URL.includes("XXXX") && !SUPABASE_KEY.includes("XXXX");

  if (!configOk) {
    initMsg.textContent = "Supabase yapılandırması eksik — Vercel env değişkenlerini kontrol et.";
    return; // stop — overlay stays visible
  }

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const BUCKET = "memes";
  const ALLOWED = new Set(["image/jpeg","image/png","image/gif","image/webp"]);

  // Hide overlay
  overlay.classList.add("hidden");
  setTimeout(() => overlay.remove(), 400);

  // ── 2. DOM REFS ───────────────────────────────────────────────────────────
  const searchInput    = document.getElementById("searchInput");
  const dropzone       = document.getElementById("dropzone");
  const pickFileBtn    = document.getElementById("pickFileBtn");
  const fileInput      = document.getElementById("fileInput");
  const previewWrap    = document.getElementById("previewWrap");
  const previewImg     = document.getElementById("previewImg");
  const previewName    = document.getElementById("previewName");
  const titleInput     = document.getElementById("titleInput");
  const tagsInput      = document.getElementById("tagsInput");
  const uploadBtn      = document.getElementById("uploadBtn");
  const progressWrap   = document.getElementById("progressWrap");
  const progressBar    = document.getElementById("progressBar");
  const gallery        = document.getElementById("gallery");
  const emptyState     = document.getElementById("emptyState");
  const galleryMeta    = document.getElementById("galleryMeta");
  const toastEl        = document.getElementById("toastEl");
  const viewer         = document.getElementById("viewer");
  const viewerImage    = document.getElementById("viewerImage");
  const viewerTitle    = document.getElementById("viewerTitle");
  const viewerTags     = document.getElementById("viewerTags");
  const viewerDownloadBtn = document.getElementById("viewerDownloadBtn");
  const viewerCopyBtn  = document.getElementById("viewerCopyBtn");
  const viewerCloseBtn = document.getElementById("viewerCloseBtn");
  const viewerPrevBtn  = document.getElementById("viewerPrevBtn");
  const viewerNextBtn  = document.getElementById("viewerNextBtn");

  let memes = [];
  let selectedFile = null;
  let activeTag = "";
  let toastTimer = null;
  let searchTimer = null;
  let activeViewerIndex = -1;

  // ── 3. HELPERS ────────────────────────────────────────────────────────────
  function esc(v) {
    return String(v || "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }

  function showToast(msg, ms = 2400) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), ms);
  }

  function setProgress(p) {
    progressBar.style.width = p + "%";
    progressWrap.classList.toggle("show", p > 0 && p < 100);
  }

  // ── 4. FILE SELECTION ─────────────────────────────────────────────────────
  function setFile(file) {
    if (!file) return;
    if (!ALLOWED.has(file.type)) { showToast("Sadece JPG, PNG, GIF veya WEBP kabul edilir."); return; }
    selectedFile = file;
    previewImg.src = URL.createObjectURL(file);
    previewName.textContent = file.name;
    previewWrap.classList.add("show");
  }

  function clearFile() {
    selectedFile = null;
    fileInput.value = "";
    previewImg.src = "";
    previewName.textContent = "";
    previewWrap.classList.remove("show");
  }

  pickFileBtn.addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });
  dropzone.addEventListener("click", () => fileInput.click());
  dropzone.addEventListener("keydown", e => { if (e.key==="Enter"||e.key===" ") { e.preventDefault(); fileInput.click(); } });

  ["dragenter","dragover"].forEach(n => dropzone.addEventListener(n, e => { e.preventDefault(); dropzone.classList.add("dragover"); }));
  ["dragleave","drop"].forEach(n => dropzone.addEventListener(n, e => { e.preventDefault(); dropzone.classList.remove("dragover"); }));
  dropzone.addEventListener("drop", e => { const f = e.dataTransfer?.files?.[0]; if (f) setFile(f); });
  window.addEventListener("dragover", e => e.preventDefault());
  window.addEventListener("drop", e => e.preventDefault());

  // ── 5. UPLOAD ─────────────────────────────────────────────────────────────
  uploadBtn.addEventListener("click", async () => {
    if (!selectedFile) { showToast("Önce bir görsel seç."); return; }

    uploadBtn.disabled = true;
    uploadBtn.textContent = "Yükleniyor...";
    setProgress(15);

    try {
      const ext = (selectedFile.name.split(".").pop() || "jpg")
        .toLowerCase().replace(/[^a-z0-9]/g, "").slice(0, 5) || "jpg";
      const path = `public/${Date.now()}.${ext}`;

      setProgress(35);
      const { error: upErr } = await sb.storage.from(BUCKET).upload(path, selectedFile, {
        cacheControl: "3600",
        upsert: false,
        contentType: selectedFile.type
      });
      if (upErr) throw upErr;

      setProgress(70);
      const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`;
      const tags = tagsInput.value.split(",").map(t => t.trim()).filter(Boolean);

      const { data, error: insErr } = await sb
        .from("memes")
        .insert({ title: titleInput.value.trim() || null, url: publicUrl, tags })
        .select("id,title,url,tags,created_at")
        .single();
      if (insErr) throw insErr;

      setProgress(100);
      setTimeout(() => setProgress(0), 600);

      titleInput.value = "";
      tagsInput.value = "";
      activeTag = "";
      clearFile();

      if (data) { memes = [data, ...memes]; renderGallery(memes); }
      showToast("✓ Meme yüklendi!");
    } catch (err) {
      console.error("Upload error:", err);
      setProgress(0);
      showToast("Yükleme hatası: " + (err.message || "bilinmeyen"));
    } finally {
      uploadBtn.disabled = false;
      uploadBtn.textContent = "Yükle";
    }
  });

  // ── 6. GALLERY ────────────────────────────────────────────────────────────
  function renderGallery(list) {
    gallery.innerHTML = "";
    galleryMeta.textContent = list.length ? `${list.length} meme` : "";
    emptyState.hidden = list.length > 0;

    list.forEach(meme => {
      const card = document.createElement("article");
      card.className = "card";
      const tags = Array.isArray(meme.tags) ? meme.tags : [];
      const tagsHtml = tags.map(t =>
        `<button class="tag${activeTag===t?" active":""}" type="button" data-tag="${esc(t)}">#${esc(t)}</button>`
      ).join("");

      card.innerHTML = `
        <div class="card-actions">
          <button class="icon-btn" type="button" data-action="copy" title="Link kopyala">⎘</button>
          <button class="icon-btn" type="button" data-action="del" title="Sil">🗑</button>
        </div>
        <img class="thumb" src="${esc(meme.url)}" alt="${esc(meme.title||"meme")}" loading="lazy" />
        <div class="card-body">
          <p class="card-title">${esc(meme.title||"Başlıksız")}</p>
          <div class="tags">${tagsHtml}</div>
        </div>
      `;

      card.addEventListener("click", async e => {
        const actionBtn = e.target.closest("[data-action]");
        const tagBtn    = e.target.closest("[data-tag]");

        if (actionBtn) {
          e.stopPropagation();
          if (actionBtn.dataset.action === "copy") {
            try { await navigator.clipboard.writeText(meme.url); showToast("Link kopyalandı!"); }
            catch { showToast("Kopyalanamadı."); }
          } else if (actionBtn.dataset.action === "del") {
            if (!confirm("Bu meme silinsin mi?")) return;
            try {
              // Correctly extract storage path from full public URL
              const marker = `/object/public/${BUCKET}/`;
              const markerIdx = meme.url.indexOf(marker);
              if (markerIdx < 0) throw new Error("Storage yolu çözümlenemedi.");
              const storagePath = meme.url.slice(markerIdx + marker.length);
              await sb.storage.from(BUCKET).remove([storagePath]);
              await sb.from("memes").delete().eq("id", meme.id);
              memes = memes.filter(m => m.id !== meme.id);
              renderGallery(memes);
              showToast("Meme silindi.");
            } catch (err) {
              console.error("Delete error:", err);
              showToast("Silme hatası: " + (err.message || ""));
            }
          }
          return;
        }

        if (tagBtn) {
          e.stopPropagation();
          const t = tagBtn.dataset.tag;
          if (activeTag === t) { activeTag = ""; searchInput.value = ""; fetchMemes(""); }
          else { activeTag = t; searchInput.value = t; fetchMemes(t); }
          return;
        }

        // Open viewer
        const idx = memes.findIndex(m => m.id === meme.id);
        if (idx >= 0) openViewer(idx);
      });

      gallery.appendChild(card);
    });
  }

  // ── 7. FETCH ──────────────────────────────────────────────────────────────
  async function fetchMemes(q = "") {
    try {
      let builder = sb.from("memes")
        .select("id,title,url,tags,created_at")
        .order("created_at", { ascending: false });

      if (q.trim()) {
        const safe = q.trim().replace(/[{}",]/g, "");
        builder = builder.or(`title.ilike.%${safe}%,tags.cs.{${safe}}`);
      }

      const { data, error } = await builder;
      if (error) throw error;
      memes = data || [];
      renderGallery(memes);
    } catch (err) {
      console.error("Fetch error:", err);
      showToast("Memeler yüklenemedi: " + (err.message || ""));
    }
  }

  let searchDebounce = null;
  searchInput.addEventListener("input", e => {
    activeTag = "";
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => fetchMemes(e.target.value), 150);
  });

  // ── 8. VIEWER ─────────────────────────────────────────────────────────────
  function renderViewer(index) {
    if (!memes.length) return;
    const i = (index + memes.length) % memes.length;
    activeViewerIndex = i;
    const m = memes[i];
    const title = m.title || "Başlıksız";
    viewerTitle.textContent = title;
    viewerImage.src = m.url;
    viewerImage.alt = title;
    viewerDownloadBtn.href = m.url;
    // Force download by fetching blob (works cross-origin for Supabase storage)
    viewerDownloadBtn.setAttribute("download", `meme_${Date.now()}`);
    viewerDownloadBtn.onclick = async (e) => {
      e.preventDefault();
      try {
        const blob = await fetch(m.url).then(r => r.blob());
        const ext = blob.type.split("/")[1] || "jpg";
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `meme_${m.id.slice(0,8)}.${ext}`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 5000);
      } catch {
        // Fallback: open in new tab
        window.open(m.url, "_blank");
      }
    };
    const tags = Array.isArray(m.tags) ? m.tags : [];
    viewerTags.innerHTML = tags.length
      ? tags.map(t => `<span class="tag">#${esc(t)}</span>`).join("")
      : `<span style="color:var(--muted);font-size:12px;font-family:'DM Mono',monospace">etiketsiz</span>`;
  }

  function openViewer(index) {
    renderViewer(index);
    viewer.classList.add("open");
    viewer.setAttribute("aria-hidden", "false");
  }

  function closeViewer() {
    viewer.classList.remove("open");
    viewer.setAttribute("aria-hidden", "true");
    viewerImage.src = "";
    activeViewerIndex = -1;
  }

  viewerCloseBtn.addEventListener("click", closeViewer);
  viewerPrevBtn.addEventListener("click", () => renderViewer(activeViewerIndex - 1));
  viewerNextBtn.addEventListener("click", () => renderViewer(activeViewerIndex + 1));
  viewerCopyBtn.addEventListener("click", async () => {
    if (activeViewerIndex < 0) return;
    try { await navigator.clipboard.writeText(memes[activeViewerIndex].url); showToast("Link kopyalandı!"); }
    catch { showToast("Kopyalanamadı."); }
  });
  viewer.addEventListener("click", e => { if (e.target === viewer) closeViewer(); });
  window.addEventListener("keydown", e => {
    if (!viewer.classList.contains("open")) return;
    if (e.key === "Escape") closeViewer();
    if (e.key === "ArrowLeft") renderViewer(activeViewerIndex - 1);
    if (e.key === "ArrowRight") renderViewer(activeViewerIndex + 1);
  });

  // ── 9. SERVICE WORKER ─────────────────────────────────────────────────────
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js").catch(err => console.warn("SW:", err));
  }

  // ── 10. START ─────────────────────────────────────────────────────────────
  fetchMemes();
})();
</script>

</body>
</html>
