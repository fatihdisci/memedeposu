<!doctype html>

<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Meme Depot" />
  <meta name="theme-color" content="#0d0d0d" />
  <title>Meme Deposu</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="https://fav.farm/🗂️" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0d;
      --card: #1a1a1a;
      --accent: #e8ff47;
      --text: #f0f0f0;
      --muted: #888;
      --border: #2a2a2a;
      --radius: 14px;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);
      --safe-right: env(safe-area-inset-right);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { height: -webkit-fill-available; }
    body {
      margin: 0;
      background: radial-gradient(circle at 20% 0%, #171717, #0d0d0d 45%);
      color: var(--text);
      font-family: "DM Sans", sans-serif;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding-top: calc(16px + var(--safe-top));
      padding-bottom: calc(40px + var(--safe-bottom));
      padding-left: calc(16px + var(--safe-left));
      padding-right: calc(16px + var(--safe-right));
    }
    .topbar { display: flex; gap: 10px; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; }
    h1 { margin: 0; font-family: "DM Mono", monospace; letter-spacing: 0.04em; font-size: clamp(20px, 5vw, 32px); }
    .search {
      width: 100%; border: 0; border-bottom: 2px solid var(--accent);
      background: #0a0a0a; color: var(--text); padding: 14px;
      font-size: 16px; outline: none; transition: all 0.15s ease;
      border-radius: 8px 8px 0 0; -webkit-appearance: none; appearance: none;
    }
    .search::placeholder { color: var(--muted); }
    .search:focus { background: #131313; border-bottom-color: #f3ff9c; }
    .uploader { margin-top: 14px; background: #101010; border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
    .dropzone {
      border: 2px dashed var(--border); border-radius: 12px; min-height: 90px;
      display: grid; place-items: center; text-align: center; color: var(--muted);
      padding: 16px; cursor: pointer; transition: all 0.15s ease;
      font-family: "DM Mono", monospace; font-size: 14px; background: #121212;
      user-select: none; -webkit-user-select: none;
    }
    .dropzone:active { border-color: #555; }
    .dropzone.dragover { border-color: var(--accent); color: var(--accent); background: #161616; box-shadow: 0 0 0 1px var(--accent) inset; }
    .preview-wrap { display: none; align-items: center; gap: 12px; margin-top: 10px; }
    .preview-wrap.show { display: flex; }
    #previewImg { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); flex-shrink: 0; }
    .preview-name { font-size: 12px; color: var(--muted); word-break: break-all; }
    .upload-grid { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
    .input {
      width: 100%; border-radius: 10px; border: 1px solid var(--border);
      background: #131313; color: var(--text); padding: 14px 12px;
      transition: all 0.15s ease; font-size: 16px; font-family: "DM Sans", sans-serif;
      -webkit-appearance: none; appearance: none;
    }
    .input::placeholder { color: var(--muted); }
    .input:focus { outline: none; border-color: var(--accent); }
    .btn-row { display: flex; gap: 10px; margin-top: 12px; }
    .ghost-btn {
      flex: 1; cursor: pointer; border: 1px solid var(--border); background: #171717;
      color: var(--text); border-radius: 10px; padding: 14px 12px; font-size: 15px;
      transition: all 0.15s ease; font-family: "DM Sans", sans-serif; min-height: 50px;
      -webkit-appearance: none;
    }
    .ghost-btn:active { background: #222; }
    .button {
      flex: 2; border-radius: 10px; border: none; background: var(--accent);
      color: #151515; padding: 14px 12px; transition: all 0.15s ease; font-size: 16px;
      font-weight: 700; cursor: pointer; font-family: "DM Sans", sans-serif;
      min-height: 50px; -webkit-appearance: none;
    }
    .button:active { filter: brightness(0.9); }
    .button:disabled { opacity: 0.6; cursor: not-allowed; }
    .progress-wrap { height: 3px; background: var(--border); border-radius: 999px; margin-top: 10px; display: none; overflow: hidden; }
    .progress-wrap.show { display: block; }
    .progress-bar { height: 100%; width: 0%; background: var(--accent); border-radius: 999px; transition: width 0.2s; }
    .gallery-meta { margin-top: 14px; font-size: 12px; color: var(--muted); font-family: "DM Mono", monospace; }
    .gallery { margin-top: 10px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    @media (min-width: 480px) { .gallery { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 768px) { .gallery { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 1100px) { .gallery { grid-template-columns: repeat(5, 1fr); } }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; transition: border-color 0.15s ease; position: relative;
      cursor: pointer; animation: fadeUp 0.2s ease both;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @media (hover: hover) { .card:hover { border-color: var(--accent); transform: translateY(-2px); } }
    .card:active { border-color: var(--accent); }
    .thumb { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; display: block; background: #0b0b0b; }
    .card-body { padding: 8px 10px 10px; }
    .card-title { margin: 0 0 6px; font-size: 12px; font-weight: 500; word-break: break-word; color: var(--text); }
    .tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag {
      border: 1px solid #323232; background: #2a2a2a; color: #d7d7d7;
      border-radius: 999px; padding: 3px 8px; font-size: 11px;
      font-family: "DM Mono", monospace; cursor: pointer; transition: all 0.15s ease;
    }
    .tag.active { background: var(--accent); border-color: var(--accent); color: #151515; }
    .tag:active { background: var(--accent); border-color: var(--accent); color: #151515; }
    @media (hover: hover) { .tag:hover { background: var(--accent); border-color: var(--accent); color: #151515; } }
    .card-actions {
      position: absolute; top: 6px; right: 6px; display: flex; gap: 5px;
      opacity: 0; transition: opacity 0.15s ease;
    }
    @media (hover: none) { .card-actions { opacity: 1; } }
    @media (hover: hover) { .card:hover .card-actions { opacity: 1; } }
    .icon-btn {
      border: 1px solid rgba(255,255,255,0.15); background: rgba(15,15,15,0.88);
      color: #ececec; width: 32px; height: 32px; border-radius: 8px;
      display: grid; place-items: center; cursor: pointer; font-size: 14px;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .icon-btn:active { border-color: var(--accent); color: var(--accent); }
    .empty { margin-top: 24px; color: var(--muted); font-size: 14px; text-align: center; }
    .toast {
      position: fixed; right: 16px; left: 16px;
      bottom: calc(16px + var(--safe-bottom));
      background: #1a1a1a; border: 1px solid var(--accent); color: var(--text);
      padding: 12px 16px; border-radius: 12px; font-size: 14px; opacity: 0;
      transform: translateY(8px); pointer-events: none; transition: all 0.2s ease;
      z-index: 999; text-align: center;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .viewer {
      position: fixed; inset: 0; background: rgba(0,0,0,0.96);
      display: none; flex-direction: column; z-index: 60;
      padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);
    }
    .viewer.open { display: flex; }
    .viewer-top {
      display: flex; justify-content: space-between; align-items: center;
      gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border);
      flex-shrink: 0; min-height: 52px;
    }
    .viewer-title {
      margin: 0; font-family: "DM Mono", monospace; font-size: 13px;
      color: #d6d6d6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .viewer-close {
      border: 1px solid var(--border); border-radius: 8px; background: #1a1a1a;
      color: var(--text); width: 36px; height: 36px; display: grid; place-items: center;
      cursor: pointer; font-size: 16px; flex-shrink: 0;
    }
    .viewer-close:active { border-color: var(--accent); color: var(--accent); }
    .viewer-stage {
      flex: 1; min-height: 0; display: flex; align-items: center;
      justify-content: center; overflow: hidden; background: #000; position: relative;
    }
    .viewer-image {
      max-width: 100%; max-height: 100%; object-fit: contain; display: block;
      user-select: none; -webkit-user-select: none;
    }
    .viewer-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.6);
      color: #fff; width: 40px; height: 40px; border-radius: 999px;
      display: grid; place-items: center; cursor: pointer; font-size: 20px;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .viewer-nav.prev { left: 10px; }
    .viewer-nav.next { right: 10px; }
    .viewer-nav:active { background: rgba(232,255,71,0.2); border-color: var(--accent); }
    .viewer-bottom {
      padding: 12px 16px; border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      gap: 10px; flex-wrap: wrap; flex-shrink: 0;
    }
    .viewer-tags { display: flex; flex-wrap: wrap; gap: 5px; flex: 1; }
    .viewer-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .viewer-btn {
      border: 1px solid var(--border); border-radius: 10px; background: #1a1a1a;
      color: var(--text); padding: 10px 14px; cursor: pointer; text-decoration: none;
      transition: all 0.15s ease; font-size: 14px; font-family: "DM Sans", sans-serif;
      display: inline-flex; align-items: center; gap: 5px; min-height: 44px;
    }
    .viewer-btn:active { border-color: var(--accent); color: var(--accent); }
    #initOverlay {
      position: fixed; inset: 0; background: #0d0d0d;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.3s;
    }
    #initOverlay.hidden { opacity: 0; pointer-events: none; }
    #initMsg { font-family: "DM Mono", monospace; font-size: 13px; color: var(--muted); text-align: center; padding: 20px; }
  </style>
</head>
<body>
<div id="initOverlay"><span id="initMsg">Yükleniyor...</span></div>

<div class="container">
  <div class="topbar"><h1>MEME DEPOT</h1></div>

<input id="searchInput" class="search" type="search" placeholder="Başlık veya etiket ara..."
autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />

  <div class="uploader">
    <div id="dropzone" class="dropzone" role="button" tabindex="0">
      <div><strong>Dosyayı buraya bırak</strong><br />veya aşağıdan seç</div>
    </div>
    <div id="previewWrap" class="preview-wrap">
      <img id="previewImg" src="" alt="önizleme" />
      <span id="previewName" class="preview-name"></span>
    </div>
    <div class="upload-grid">
      <input id="titleInput" class="input" type="text" placeholder="Başlık (opsiyonel)"
        maxlength="140" autocorrect="off" autocapitalize="sentences" />
      <input id="tagsInput" class="input" type="text" placeholder="Etiketler: kedi, komik, günlük"
        autocorrect="off" autocapitalize="none" />
    </div>
    <div id="progressWrap" class="progress-wrap"><div id="progressBar" class="progress-bar"></div></div>
    <div class="btn-row">
      <button id="pickFileBtn" class="ghost-btn" type="button">📁 Seç</button>
      <button id="uploadBtn" class="button" type="button">Yükle</button>
    </div>
    <input id="fileInput" type="file" accept="image/jpeg,image/png,image/gif,image/webp" hidden />
  </div>

  <p id="galleryMeta" class="gallery-meta"></p>
  <div id="gallery" class="gallery"></div>
  <p id="emptyState" class="empty" hidden>Henüz meme yok. İlkini yükle!</p>
</div>

<div id="toastEl" class="toast"></div>

<div id="viewer" class="viewer" aria-hidden="true">
  <div class="viewer-top">
    <p id="viewerTitle" class="viewer-title">Önizleme</p>
    <button id="viewerCloseBtn" class="viewer-close" type="button" aria-label="Kapat">✕</button>
  </div>
  <div class="viewer-stage" id="viewerStage">
    <button class="viewer-nav prev" id="viewerPrevBtn" type="button">‹</button>
    <img id="viewerImage" class="viewer-image" src="" alt="" />
    <button class="viewer-nav next" id="viewerNextBtn" type="button">›</button>
  </div>
  <div class="viewer-bottom">
    <div id="viewerTags" class="viewer-tags"></div>
    <div class="viewer-actions">
      <button id="viewerCopyBtn" class="viewer-btn" type="button">⎘ Link</button>
      <button id="viewerDownloadBtn" class="viewer-btn" type="button">⬇ İndir</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
(async () => {
  const overlay = document.getElementById('initOverlay');
  const initMsg = document.getElementById('initMsg');

  let SUPABASE_URL = '', SUPABASE_KEY = '';
  try {
    const res = await fetch('/api/config.js');
    if (!res.ok) throw new Error('config ' + res.status);
    new Function(await res.text())();
    const cfg = window.__MEME_DEPOT_CONFIG__ || {};
    SUPABASE_URL = String(cfg.SUPABASE_URL || '').trim();
    SUPABASE_KEY = String(cfg.SUPABASE_KEY || '').trim();
  } catch (err) { console.error(err); }

  if (!SUPABASE_URL || !SUPABASE_KEY || SUPABASE_URL.includes('XXXX')) {
    initMsg.textContent = 'Supabase yapılandırması eksik.';
    return;
  }

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const BUCKET = 'memes';
  const ALLOWED = new Set(['image/jpeg','image/png','image/gif','image/webp']);
  overlay.classList.add('hidden');
  setTimeout(() => overlay.remove(), 400);

  const $ = id => document.getElementById(id);
  const searchInput=$('searchInput'), dropzone=$('dropzone'),
        pickFileBtn=$('pickFileBtn'), fileInput=$('fileInput'),
        previewWrap=$('previewWrap'), previewImg=$('previewImg'),
        previewName=$('previewName'), titleInput=$('titleInput'),
        tagsInput=$('tagsInput'),     uploadBtn=$('uploadBtn'),
        progressWrap=$('progressWrap'),progressBar=$('progressBar'),
        gallery=$('gallery'),         emptyState=$('emptyState'),
        galleryMeta=$('galleryMeta'), toastEl=$('toastEl'),
        viewer=$('viewer'),           viewerImage=$('viewerImage'),
        viewerStage=$('viewerStage'), viewerTitle=$('viewerTitle'),
        viewerTags=$('viewerTags'),   viewerCloseBtn=$('viewerCloseBtn'),
        viewerPrevBtn=$('viewerPrevBtn'),viewerNextBtn=$('viewerNextBtn'),
        viewerCopyBtn=$('viewerCopyBtn'),viewerDownloadBtn=$('viewerDownloadBtn');

  let memes=[], selectedFile=null, activeTag='',
      toastTimer=null, searchTimer=null, activeViewerIndex=-1;

  function esc(v) {
    return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function showToast(msg) {
    toastEl.textContent = msg; toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2600);
  }
  function setProgress(p) {
    progressBar.style.width = p + '%';
    progressWrap.classList.toggle('show', p > 0 && p < 100);
  }

  // FILE
  function setFile(file) {
    if (!file) return;
    if (!ALLOWED.has(file.type)) { showToast('Sadece JPG, PNG, GIF veya WEBP kabul edilir.'); return; }
    selectedFile = file;
    previewImg.src = URL.createObjectURL(file);
    previewName.textContent = file.name;
    previewWrap.classList.add('show');
  }
  function clearFile() {
    selectedFile=null; fileInput.value=''; previewImg.src='';
    previewName.textContent=''; previewWrap.classList.remove('show');
  }

  pickFileBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });
  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); fileInput.click(); } });
  ['dragenter','dragover'].forEach(n => dropzone.addEventListener(n, e => { e.preventDefault(); dropzone.classList.add('dragover'); }));
  ['dragleave','drop'].forEach(n => dropzone.addEventListener(n, e => { e.preventDefault(); dropzone.classList.remove('dragover'); }));
  dropzone.addEventListener('drop', e => { const f = e.dataTransfer?.files?.[0]; if (f) setFile(f); });
  window.addEventListener('dragover', e => e.preventDefault());
  window.addEventListener('drop', e => e.preventDefault());

  // UPLOAD
  uploadBtn.addEventListener('click', async () => {
    if (!selectedFile) { showToast('Önce bir görsel seç.'); return; }
    uploadBtn.disabled=true; uploadBtn.textContent='Yükleniyor...'; setProgress(15);
    try {
      const ext = (selectedFile.name.split('.').pop()||'jpg').toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,5)||'jpg';
      const path = 'public/' + Date.now() + '.' + ext;
      setProgress(35);
      const { error: upErr } = await sb.storage.from(BUCKET).upload(path, selectedFile, {
        cacheControl: '3600', upsert: false, contentType: selectedFile.type
      });
      if (upErr) throw upErr;
      setProgress(70);
      const url = SUPABASE_URL + '/storage/v1/object/public/' + BUCKET + '/' + path;
      const tags = tagsInput.value.split(',').map(t=>t.trim()).filter(Boolean);
      const { data, error: insErr } = await sb.from('memes')
        .insert({ title: titleInput.value.trim()||null, url, tags })
        .select('id,title,url,tags,created_at').single();
      if (insErr) throw insErr;
      setProgress(100); setTimeout(() => setProgress(0), 600);
      titleInput.value=''; tagsInput.value=''; activeTag=''; clearFile();
      if (data) { memes=[data,...memes]; renderGallery(memes); }
      showToast('✓ Meme yüklendi!');
    } catch (err) {
      console.error(err); setProgress(0);
      showToast('Yükleme hatası: ' + (err.message||'bilinmeyen'));
    } finally { uploadBtn.disabled=false; uploadBtn.textContent='Yükle'; }
  });

  // GALLERY
  function renderGallery(list) {
    gallery.innerHTML='';
    galleryMeta.textContent = list.length ? list.length + ' meme' : '';
    emptyState.hidden = list.length > 0;
    list.forEach(meme => {
      const card = document.createElement('article');
      card.className = 'card';
      const tags = Array.isArray(meme.tags) ? meme.tags : [];
      card.innerHTML =
        '<div class="card-actions">' +
          '<button class="icon-btn" data-action="copy">⎘</button>' +
          '<button class="icon-btn" data-action="del">🗑</button>' +
        '</div>' +
        '<img class="thumb" src="' + esc(meme.url) + '" alt="' + esc(meme.title||'meme') + '" loading="lazy" />' +
        '<div class="card-body">' +
          '<p class="card-title">' + esc(meme.title||'Başlıksız') + '</p>' +
          '<div class="tags">' + tags.map(t => '<button class="tag' + (activeTag===t?' active':'') + '" data-tag="' + esc(t) + '">#' + esc(t) + '</button>').join('') + '</div>' +
        '</div>';

      card.addEventListener('click', async e => {
        const ab = e.target.closest('[data-action]');
        const tb = e.target.closest('[data-tag]');
        if (ab) {
          e.stopPropagation();
          if (ab.dataset.action==='copy') {
            try { await navigator.clipboard.writeText(meme.url); showToast('Link kopyalandı!'); }
            catch { showToast('Kopyalanamadı.'); }
          } else if (ab.dataset.action==='del') {
            if (!confirm('Bu meme silinsin mi?')) return;
            try {
              const marker = '/object/public/' + BUCKET + '/';
              const idx2 = meme.url.indexOf(marker);
              if (idx2 < 0) throw new Error('Path bulunamadı');
              await sb.storage.from(BUCKET).remove([meme.url.slice(idx2 + marker.length)]);
              await sb.from('memes').delete().eq('id', meme.id);
              memes = memes.filter(m => m.id !== meme.id);
              renderGallery(memes); showToast('Meme silindi.');
            } catch (err) { showToast('Silme hatası: ' + (err.message||'')); }
          }
          return;
        }
        if (tb) {
          e.stopPropagation();
          const t = tb.dataset.tag;
          if (activeTag===t) { activeTag=''; searchInput.value=''; fetchMemes(''); }
          else { activeTag=t; searchInput.value=t; fetchMemes(t); }
          return;
        }
        const idx = memes.findIndex(m => m.id===meme.id);
        if (idx >= 0) openViewer(idx);
      });
      gallery.appendChild(card);
    });
  }

  // FETCH
  async function fetchMemes(q='') {
    try {
      let b = sb.from('memes').select('id,title,url,tags,created_at').order('created_at',{ascending:false});
      if (q.trim()) { const s=q.trim().replace(/[{}",]/g,''); b=b.or('title.ilike.%'+s+'%,tags.cs.{'+s+'}'); }
      const { data, error } = await b;
      if (error) throw error;
      memes=data||[]; renderGallery(memes);
    } catch (err) { showToast('Yükleme hatası: '+(err.message||'')); }
  }
  searchInput.addEventListener('input', e => {
    activeTag=''; clearTimeout(searchTimer);
    searchTimer = setTimeout(() => fetchMemes(e.target.value), 150);
  });

  // VIEWER
  function renderViewer(index) {
    if (!memes.length) return;
    const i = (index+memes.length)%memes.length;
    activeViewerIndex=i;
    const m=memes[i];
    viewerTitle.textContent = m.title||'Başlıksız';
    viewerImage.src = m.url;
    viewerImage.alt = m.title||'meme';
    const tags=Array.isArray(m.tags)?m.tags:[];
    viewerTags.innerHTML = tags.map(t=>'<span class="tag">#'+esc(t)+'</span>').join('') ||
      '<span style="color:var(--muted);font-size:12px">etiketsiz</span>';
  }
  function openViewer(index) {
    renderViewer(index);
    viewer.classList.add('open');
    viewer.setAttribute('aria-hidden','false');
    document.body.style.overflow='hidden';
  }
  function closeViewer() {
    viewer.classList.remove('open');
    viewer.setAttribute('aria-hidden','true');
    viewerImage.src=''; activeViewerIndex=-1;
    document.body.style.overflow='';
  }

  viewerCloseBtn.addEventListener('click', closeViewer);
  viewerPrevBtn.addEventListener('click', () => renderViewer(activeViewerIndex-1));
  viewerNextBtn.addEventListener('click', () => renderViewer(activeViewerIndex+1));

  viewerCopyBtn.addEventListener('click', async () => {
    if (activeViewerIndex<0) return;
    try { await navigator.clipboard.writeText(memes[activeViewerIndex].url); showToast('Link kopyalandı!'); }
    catch { showToast('Kopyalanamadı.'); }
  });

  viewerDownloadBtn.addEventListener('click', async () => {
    if (activeViewerIndex<0) return;
    const m = memes[activeViewerIndex];
    showToast('İndiriliyor...');
    try {
      const blob = await fetch(m.url).then(r => r.blob());
      const ext = (blob.type.split('/')[1]||'jpg').replace('jpeg','jpg');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'meme_' + (m.id||'').slice(0,8) + '.' + ext;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(a.href), 5000);
      showToast('✓ İndirildi!');
    } catch {
      window.open(m.url, '_blank');
      showToast('Görsel yeni sekmede açıldı — basılı tutarak kaydet.');
    }
  });

  // Swipe (iOS)
  let touchStartX=0, touchStartY=0;
  viewerStage.addEventListener('touchstart', e => {
    touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY;
  }, { passive: true });
  viewerStage.addEventListener('touchend', e => {
    const dx = touchStartX - e.changedTouches[0].clientX;
    const dy = touchStartY - e.changedTouches[0].clientY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      renderViewer(activeViewerIndex + (dx > 0 ? 1 : -1));
    }
  }, { passive: true });

  viewer.addEventListener('click', e => { if (e.target===viewer) closeViewer(); });
  window.addEventListener('keydown', e => {
    if (!viewer.classList.contains('open')) return;
    if (e.key==='Escape') closeViewer();
    if (e.key==='ArrowLeft') renderViewer(activeViewerIndex-1);
    if (e.key==='ArrowRight') renderViewer(activeViewerIndex+1);
  });

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
  fetchMemes();
})();
</script>

</body>
</html>
